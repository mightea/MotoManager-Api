name: Docker Publish

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_run:
    workflows: ["release-please"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version metadata
        id: vars
        run: |
          VERSION=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          SHA=${{ github.event.workflow_run.head_sha || github.sha }}
          TAG=$(git tag --points-at $SHA | grep "^v$VERSION" | head -n 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update version in Cargo.toml
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${{ github.ref_name }}
          # Strip 'v' prefix if it exists
          VERSION=${VERSION#v}
          sed -i "/^\[package\]/,/^\[/ s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: List files (troubleshooting)
        run: ls -la

      - name: Log in to the Container registry
        if: ${{ github.event_name != 'workflow_run' || steps.vars.outputs.tag != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: ${{ github.event_name != 'workflow_run' || steps.vars.outputs.tag != '' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.vars.outputs.version }}
            type=sha

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_run' || steps.vars.outputs.tag != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: ${{ github.event_name != 'workflow_run' || steps.vars.outputs.tag != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
